<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Failed | Grocery Store</title>
  <link rel="stylesheet" href="shop.css">
  <style>
    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background-color: #5a9cf7;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Payment Failed</h2>
    <p>There was an issue processing your payment. Please try again or contact support.</p>
    <button onclick="window.location.href='checkout.html'">Retry Payment</button>
    <button onclick="window.location.href='cart.html'">Return to Cart</button>
  </div>
</body>
</html>
