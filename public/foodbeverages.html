<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rootsy - Product Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #24b47e;
            --primary-dark: #1e9e6f;
            --secondary: #ff6600;
            --error: #e74c3c;
            --text: #333;
            --text-light: #666;
            --bg: #f5f5f5;
            --card-bg: #fff;
            --border: #e5e5e5;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        /* Navbar */
        .navbar {
            background-color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo img {
            height: 40px;
        }
        
        .search-bar {
            display: flex;
            flex: 1;
            max-width: 500px;
            margin: 0 16px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-right: none;
            border-radius: 6px 0 0 6px;
            font-size: 14px;
        }
        
        .search-bar button {
            padding: 0 16px;
            border: none;
            background-color: var(--secondary);
            color: white;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            font-weight: bold;
        }
        
        .navbar-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .nav-icon {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .nav-icon:hover {
            background-color: #f0f0f0;
        }
        
        .icon-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--error);
            color: white;
            font-size: 11px;
            border-radius: 50%;
            padding: 2px 6px;
        }
        
        /* Main Content */
        .content {
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            align-items: center;
        }
        
        select {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        
        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .product-card:hover {
            transform: translateY(-4px);
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .product-image img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }
        
        .product-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--error);
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .product-content {
            padding: 16px;
        }
        
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .product-description {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .product-seller {
            color: var(--text-light);
        }
        
        .product-category {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .product-stock {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 12px;
        }
        
        .add-to-cart {
            width: 100%;
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .add-to-cart:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        /* Loading States */
        .loading-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        
        .loading-card {
            background: #f0f0f0;
            border-radius: 12px;
            height: 380px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                padding: 12px;
            }
            
            .search-bar {
                width: 100%;
                margin: 8px 0;
            }
            
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="https://i.ibb.co/9kyCpTBY/Image-Preview-from-Remove-bg.png" alt="Rootsy Logo">
        </a>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products...">
            <button onclick="loadProducts()">Search</button>
        </div>

        <div class="navbar-right">
            <a href="profile.html" class="nav-icon" id="profileLink">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
            <a href="wishlist.html" class="nav-icon">
                ❤️ <span class="icon-count" id="wishlistCount">0</span>
            </a>
            <a href="cart.html" class="nav-icon">
                🛒 <span class="icon-count" id="cartCount">0</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="content">
        <h1>Our Products</h1>
        
        <div class="filters">
            <label for="categorySelect">Category:</label>
            <select id="categorySelect">
                <option value="all">All Categories</option>
            </select>

            <label for="sortSelect">Sort By:</label>
            <select id="sortSelect">
                <option value="default">Recommended</option>
                <option value="priceLowHigh">Price: Low to High</option>
                <option value="priceHighLow">Price: High to Low</option>
            </select>
        </div>

        <div id="productList" class="loading-grid">
            <div class="loading-card"></div>
            <div class="loading-card"></div>
            <div class="loading-card"></div>
            <div class="loading-card"></div>
        </div>
    </main>

    <script>
        // Supabase Configuration
        const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // DOM Elements
        const elements = {
            productList: document.getElementById('productList'),
            categorySelect: document.getElementById('categorySelect'),
            sortSelect: document.getElementById('sortSelect'),
            searchInput: document.getElementById('searchInput'),
            cartCount: document.getElementById('cartCount'),
            wishlistCount: document.getElementById('wishlistCount'),
            profileLink: document.getElementById('profileLink')
        };

        // State Management
        const state = {
            products: [],
            categories: [],
            cart: JSON.parse(localStorage.getItem('cart')) || [],
            wishlist: JSON.parse(localStorage.getItem('wishlist')) || []
        };

        // Initialize the page
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCategories();
            await loadProducts();
            updateCartCounts();
        });

        // Product Loading Functions
        async function loadCategories() {
            try {
                // Get unique categories from products
                const { data, error } = await supabase
                    .from('products')
                    .select('category_name')
                    .order('category_name', { ascending: true });

                if (error) throw error;

                // Extract unique categories
                const uniqueCategories = [...new Set(data.map(item => item.category_name))];
                state.categories = uniqueCategories;

                // Populate dropdown
                elements.categorySelect.innerHTML = '<option value="all">All Categories</option>';
                uniqueCategories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    elements.categorySelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function loadProducts() {
            // Show loading state
            showLoadingSkeleton();

            try {
                const { data, error } = await fetchProducts();
                if (error) throw error;

                state.products = data;
                renderProducts(data);
            } catch (error) {
                console.error('Error loading products:', error);
                showErrorState();
            }
        }

        async function fetchProducts() {
            const category = elements.categorySelect.value;
            const searchTerm = elements.searchInput.value.toLowerCase();

            // Query with all required columns
            let query = supabase
                .from('products')
                .select(`
                    id,
                    name,
                    image_url,
                    price,
                    description,
                    model_url,
                    category_name,
                    seller_name,
                    stock
                `)
                .order('created_at', { ascending: false })
                .limit(50);

            if (category !== 'all') {
                query = query.eq('category_name', category);
            }

            if (searchTerm) {
                query = query.ilike('name', `%${searchTerm}%`);
            }

            return await query;
        }

        function renderProducts(products) {
            // Apply sorting
            const sortedProducts = sortProducts(products);

            // Clear existing content
            elements.productList.innerHTML = '';

            if (sortedProducts.length === 0) {
                showEmptyState();
                return;
            }

            // Render each product with all fields
            sortedProducts.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image_url}" alt="${product.name}" loading="lazy">
                        ${product.model_url ? 
                            '<div class="product-badge">3D Model</div>' : ''}
                    </div>
                    <div class="product-content">
                        <h3 class="product-title">${product.name}</h3>
                        <p class="product-description">${product.description}</p>
                        
                        <div class="product-meta">
                            <span class="product-seller">${product.seller_name}</span>
                            <span class="product-category">${product.category_name}</span>
                        </div>
                        
                        <p class="product-price">₹${product.price}</p>
                        <p class="product-stock" style="color: ${product.stock > 0 ? 'green' : 'red'}">
                            ${product.stock > 0 ? `${product.stock} in stock` : 'Out of stock'}
                        </p>
                        <button class="add-to-cart" 
                                onclick="addToCart(${product.id})" 
                                ${product.stock <= 0 ? 'disabled' : ''}>
                            ${product.stock > 0 ? 'Add to Cart' : 'Out of Stock'}
                        </button>
                    </div>
                `;
                elements.productList.appendChild(productCard);
            });
        }

        function sortProducts(products) {
            const sortBy = elements.sortSelect.value;
            
            return [...products].sort((a, b) => {
                if (sortBy === 'priceLowHigh') return a.price - b.price;
                if (sortBy === 'priceHighLow') return b.price - a.price;
                return 0; // Default sort
            });
        }

        // UI States
        function showLoadingSkeleton() {
            elements.productList.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const skeleton = document.createElement('div');
                skeleton.className = 'loading-card';
                elements.productList.appendChild(skeleton);
            }
        }

        function showEmptyState() {
            elements.productList.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                    <p>No products found matching your criteria.</p>
                    <button onclick="loadProducts()" style="margin-top: 16px; padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">
                        Refresh Products
                    </button>
                </div>
            `;
        }

        function showErrorState() {
            elements.productList.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                    <p style="color: var(--error);">Failed to load products. Please try again.</p>
                    <button onclick="loadProducts()" style="margin-top: 16px; padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">
                        Retry
                    </button>
                </div>
            `;
        }

        // Cart Functions
        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            const existingItem = state.cart.find(item => item.id === productId);
            
            if (existingItem) {
                if (existingItem.quantity >= product.stock) {
                    alert(`Only ${product.stock} available in stock!`);
                    return;
                }
                existingItem.quantity++;
            } else {
                state.cart.push({
                    id: product.id,
                    name: product.name,
                    image_url: product.image_url,
                    price: product.price,
                    description: product.description,
                    model_url: product.model_url,
                    category_name: product.category_name,
                    seller_name: product.seller_name,
                    stock: product.stock,
                    quantity: 1
                });
            }

            localStorage.setItem('cart', JSON.stringify(state.cart));
            updateCartCounts();
            alert(`${product.name} added to cart`);
        }

        function updateCartCounts() {
            const cartCount = state.cart.reduce((total, item) => total + item.quantity, 0);
            elements.cartCount.textContent = cartCount;
            elements.wishlistCount.textContent = state.wishlist.length;
        }

        // Event Listeners
        elements.categorySelect.addEventListener('change', loadProducts);
        elements.sortSelect.addEventListener('change', () => renderProducts(state.products));
        elements.searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadProducts();
        });
    </script>
</body>
</html>
