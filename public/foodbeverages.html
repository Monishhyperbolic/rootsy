<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rootsy - Fast Product Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #24b47e;
            --primary-dark: #1e9e6f;
            --secondary: #ff6600;
            --error: #e74c3c;
            --text: #333;
            --text-light: #666;
            --bg: #f5f5f5;
            --card-bg: #fff;
            --border: #e5e5e5;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        /* Promo Banner */
        .promo-banner {
            background-color: purple;
            color: white;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            font-weight: bold;
        }
        
        .promo-banner span {
            color: orange;
        }
        
        /* Navbar */
        .navbar {
            background-color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            color: black;
            text-decoration: none;
        }
        
        .logo img {
            height: 40px;
            margin-right: 10px;
        }
        
        .delivery {
            font-size: 14px;
            color: var(--text-light);
        }
        
        .search-bar {
            display: flex;
            flex: 1;
            max-width: 500px;
            margin: 0 16px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-right: none;
            border-radius: 6px 0 0 6px;
            font-size: 14px;
        }
        
        .search-bar button {
            padding: 0 16px;
            border: none;
            background-color: var(--secondary);
            color: white;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .search-bar button:hover {
            background-color: #e65c00;
        }
        
        .navbar-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .nav-icon {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .nav-icon:hover {
            background-color: #f0f0f0;
        }
        
        .icon-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--error);
            color: white;
            font-size: 11px;
            border-radius: 50%;
            padding: 2px 6px;
            min-width: 18px;
            text-align: center;
        }
        
        /* Main Content */
        .content {
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            align-items: center;
        }
        
        select, input[type="text"] {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: white;
        }
        
        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }
        
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        
        .product-image {
            width: 100%;
            height: 180px;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .product-image img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            transition: transform 0.3s;
        }
        
        .product-card:hover .product-image img {
            transform: scale(1.05);
        }
        
        .product-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--error);
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .product-content {
            padding: 16px;
        }
        
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .product-seller {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 12px;
        }
        
        .add-to-cart {
            width: 100%;
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .add-to-cart:hover {
            background-color: var(--primary-dark);
        }
        
        .add-to-cart:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        /* Loading States */
        .loading-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }
        
        .loading-card {
            background: #f0f0f0;
            border-radius: 12px;
            height: 320px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        /* Footer */
        footer {
            background: #f9f9f9;
            padding: 40px 20px;
            margin-top: 40px;
        }
        
        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .footer-column h3 {
            margin-bottom: 16px;
            font-size: 16px;
        }
        
        .footer-column a {
            display: block;
            color: var(--text);
            text-decoration: none;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .footer-column a:hover {
            color: var(--primary);
        }
        
        .social-media {
            display: flex;
            gap: 12px;
        }
        
        .social-media img {
            width: 30px;
            height: 30px;
        }
        
        .copyright {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #777;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                padding: 12px;
            }
            
            .search-bar {
                width: 100%;
                margin: 8px 0;
            }
            
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 16px;
            }
            
            .product-image {
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <!-- Promo Banner -->
    <div class="promo-banner">
        FREE delivery & 40% Discount for next 3 orders! Until: <span>47 days 06:57:08</span>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="https://i.ibb.co/9kyCpTBY/Image-Preview-from-Remove-bg.png" alt="Rootsy Logo" width="100">
        </a>

        <div class="delivery">
            <span>Deliver to</span>
            <span id="user-location">Locating...</span>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products..." />
            <button onclick="loadProducts()">Search</button>
        </div>

        <div class="navbar-right">
            <a href="profile.html" class="nav-icon" id="profileLink">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
            <a href="wishlist.html" class="nav-icon">
                ❤️ <span class="icon-count" id="wishlistCount">0</span>
            </a>
            <a href="cart.html" class="nav-icon">
                🛒 <span class="icon-count" id="cartCount">0</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="content">
        <h1>Our Products</h1>
        
        <div class="filters">
            <label for="categorySelect">Category:</label>
            <select id="categorySelect">
                <option value="all">All Categories</option>
            </select>

            <label for="sortSelect">Sort By:</label>
            <select id="sortSelect">
                <option value="default">Recommended</option>
                <option value="priceLowHigh">Price: Low to High</option>
                <option value="priceHighLow">Price: High to Low</option>
            </select>
        </div>

        <div id="productList" class="loading-grid">
            <!-- Loading skeletons will appear here -->
            <div class="loading-card"></div>
            <div class="loading-card"></div>
            <div class="loading-card"></div>
            <div class="loading-card"></div>
            <div class="loading-card"></div>
            <div class="loading-card"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-column">
                <h3>Need Help?</h3>
                <a href="mailto:support@rootsy.com">support@rootsy.com</a>
                <a href="tel:080019019028">0800 19019028</a>
            </div>
            <div class="footer-column">
                <h3>Company</h3>
                <a href="#">About Us</a>
                <a href="#">Careers</a>
            </div>
            <div class="footer-column">
                <h3>Follow Us</h3>
                <div class="social-media">
                    <a href="#"><img src="https://i.postimg.cc/7YSDZPGb/facebook.webp" alt="Facebook"></a>
                    <a href="#"><img src="https://i.postimg.cc/ZnZHPLcG/twitter.webp" alt="Twitter"></a>
                    <a href="#"><img src="https://i.postimg.cc/x10rjvVF/instagram.webp" alt="Instagram"></a>
                </div>
            </div>
            <div class="footer-column">
                <h3>Legal</h3>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>
        </div>
        <div class="copyright">
            © 2025 Rootsy. All rights reserved.
        </div>
    </footer>

    <script>
        // Supabase Client
        const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // DOM Elements
        const elements = {
            productList: document.getElementById('productList'),
            categorySelect: document.getElementById('categorySelect'),
            sortSelect: document.getElementById('sortSelect'),
            searchInput: document.getElementById('searchInput'),
            cartCount: document.getElementById('cartCount'),
            wishlistCount: document.getElementById('wishlistCount'),
            userLocation: document.getElementById('user-location'),
            profileLink: document.getElementById('profileLink')
        };

        // State Management
        const state = {
            products: [],
            categories: [],
            cart: JSON.parse(localStorage.getItem('cart')) || [],
            wishlist: JSON.parse(localStorage.getItem('wishlist')) || [],
            lastProductFetch: 0,
            productCacheDuration: 5 * 60 * 1000 // 5 minutes
        };

        // Initialize the page
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadCategories(),
                loadProducts()
            ]);
            updateCartCounts();
            initLocation();
            checkAuthStatus();
        });

        // Product Loading Functions
        async function loadCategories() {
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('category_name')
                    .order('category_name', { ascending: true });

                if (error) throw error;

                // Get unique categories
                const uniqueCategories = [...new Set(data.map(item => item.category_name))];
                state.categories = uniqueCategories;

                // Populate dropdown
                elements.categorySelect.innerHTML = '<option value="all">All Categories</option>';
                uniqueCategories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    elements.categorySelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function loadProducts() {
            // Show loading state
            showLoadingSkeleton();

            try {
                const { data, error } = await fetchProducts();
                if (error) throw error;

                state.products = data;
                state.lastProductFetch = Date.now();
                renderProducts(data);
            } catch (error) {
                console.error('Error loading products:', error);
                elements.productList.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <p style="color: var(--error); margin-bottom: 16px;">Failed to load products. Please try again.</p>
                        <button onclick="loadProducts()" style="padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">
                            Retry
                        </button>
                    </div>
                `;
            }
        }

        async function fetchProducts() {
            // Check cache first
            if (state.products.length > 0 && 
                Date.now() - state.lastProductFetch < state.productCacheDuration) {
                return { data: state.products, error: null };
            }

            const category = elements.categorySelect.value;
            const searchTerm = elements.searchInput.value.toLowerCase();

            let query = supabase
                .from('products')
                .select('id, name, image_url, price, description, category_name, seller_name, stock')
                .order('created_at', { ascending: false })
                .limit(50); // Limit results for better performance

            if (category !== 'all') {
                query = query.eq('category_name', category);
            }

            if (searchTerm) {
                query = query.ilike('name', `%${searchTerm}%`);
            }

            return await query;
        }

        function renderProducts(products) {
            // Apply sorting
            const sortedProducts = sortProducts(products);

            // Clear existing content
            elements.productList.innerHTML = '';

            if (sortedProducts.length === 0) {
                elements.productList.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <p>No products found. Try a different search.</p>
                    </div>
                `;
                return;
            }

            // Render each product
            sortedProducts.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image_url}" alt="${product.name}" loading="lazy">
                    </div>
                    <div class="product-content">
                        <h3 class="product-title">${product.name}</h3>
                        <p class="product-seller">Sold by: ${product.seller_name}</p>
                        <p class="product-price">₹${product.price}</p>
                        <button class="add-to-cart" onclick="addToCart(${product.id})" ${product.stock <= 0 ? 'disabled' : ''}>
                            ${product.stock > 0 ? 'Add to Cart' : 'Out of Stock'}
                        </button>
                    </div>
                `;
                elements.productList.appendChild(productCard);
            });
        }

        function sortProducts(products) {
            const sortBy = elements.sortSelect.value;
            
            return [...products].sort((a, b) => {
                if (sortBy === 'priceLowHigh') return a.price - b.price;
                if (sortBy === 'priceHighLow') return b.price - a.price;
                return 0; // Default sort
            });
        }

        function showLoadingSkeleton() {
            elements.productList.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const skeleton = document.createElement('div');
                skeleton.className = 'loading-card';
                elements.productList.appendChild(skeleton);
            }
        }

        // Cart Functions
        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            const existingItem = state.cart.find(item => item.id === productId);
            
            if (existingItem) {
                if (existingItem.quantity >= product.stock) {
                    alert(`Only ${product.stock} available in stock!`);
                    return;
                }
                existingItem.quantity++;
            } else {
                state.cart.push({
                    ...product,
                    quantity: 1
                });
            }

            localStorage.setItem('cart', JSON.stringify(state.cart));
            updateCartCounts();
            showToast(`${product.name} added to cart`);
        }

        function updateCartCounts() {
            const cartCount = state.cart.reduce((total, item) => total + item.quantity, 0);
            elements.cartCount.textContent = cartCount;
            elements.wishlistCount.textContent = state.wishlist.length;
        }

        // Location Services
        function initLocation() {
            if (!navigator.geolocation) {
                elements.userLocation.textContent = "Location not supported";
                return;
            }

            elements.userLocation.textContent = "Detecting...";
            
            navigator.geolocation.getCurrentPosition(
                position => {
                    getLocationName(position.coords.latitude, position.coords.longitude);
                },
                error => {
                    elements.userLocation.textContent = "Location unavailable";
                    console.error('Geolocation error:', error);
                },
                { timeout: 5000 }
            );
        }

        async function getLocationName(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=14`);
                const data = await response.json();
                
                let location = "Unknown location";
                if (data.address) {
                    location = data.address.city || data.address.town || 
                             data.address.village || data.address.county || 
                             data.address.state || "Nearby area";
                }
                
                elements.userLocation.textContent = location;
            } catch (error) {
                elements.userLocation.textContent = "Location service error";
                console.error('Geocoding error:', error);
            }
        }

        // Auth Functions
        function checkAuthStatus() {
            // Implement your auth check here
            // For demo, we'll just check localStorage
            const user = localStorage.getItem('user');
            
            if (user) {
                const userData = JSON.parse(user);
                elements.profileLink.innerHTML = `
                    <img src="${userData.avatar || 'https://i.imgur.com/8Km9tLL.png'}" 
                         alt="Profile" 
                         style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                `;
            }
        }

        // UI Helpers
        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = 'var(--primary)';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '6px';
            toast.style.zIndex = '1000';
            toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
            toast.style.animation = 'fadeInOut 3s forwards';
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Event Listeners
        elements.categorySelect.addEventListener('change', loadProducts);
        elements.sortSelect.addEventListener('change', () => renderProducts(state.products));
        elements.searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadProducts();
        });
    </script>
</body>
</html>
