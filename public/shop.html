<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Product Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }

    .promo-banner {
      background-color: purple;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
    }

    .promo-banner span {
      color: orange;
    }

    .navbar {
      background-color: white;
      padding: 10px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      color: black;
      text-decoration: none;
    }

    .logo img {
      height: 40px;
      margin-right: 10px;
    }

    .location-info {
      font-size: 14px;
      color: gray;
    }

    .search-bar {
      display: flex;
      flex: 1;
      max-width: 500px;
      margin: 10px;
    }

    .search-bar input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-right: none;
      border-radius: 4px 0 0 4px;
    }

    .search-bar button {
      padding: 8px 16px;
      border: none;
      background-color: #ff6600;
      color: white;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
    }

    .navbar-right {
      display: flex;
      gap: 15px;
      font-size: 14px;
    }

    .navbar-right a {
      text-decoration: none;
      color: black;
      position: relative;
    }

    .icon-count {
      position: absolute;
      top: -6px;
      right: -10px;
      background: #e74c3c;
      color: white;
      font-size: 12px;
      border-radius: 50%;
      padding: 2px 6px;
    }

    .content {
      padding: 20px 40px;
    }

    select, input[type="text"] {
      padding: 6px;
      font-size: 16px;
      margin: 0 10px 20px 0;
    }

    .product {
      background-color: white;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .product img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 5px;
    }

    .product-info {
      flex: 1;
    }

    .product-info h3 { margin: 0 0 5px 0; }
    .product-info p { margin: 3px 0; }

    .btn {
      padding: 6px 14px;
      font-size: 14px;
      margin-right: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .add-cart-btn { background-color: #27ae60; color: white; }
    .add-wishlist-btn { background-color: #3498db; color: white; }
  </style>
</head>
<body>

  <!-- Promo Banner -->
  <div class="promo-banner">
    FREE delivery & 40% Discount for next 3 orders! Place your 1st order in.
    Until the end of the sale: <span>47 days 06 hours 57 minutes 08 sec.</span>
  </div>

  <!-- Navbar -->
  <div class="navbar">
    <a href="index.html" class="logo">
      <img src="https://i.ibb.co/9kyCpTBY/Image-Preview-from-Remove-bg.png" style="width: 100px; height: auto;" alt="Logo" />

      
    </a>

    <div class="delivery">
                    <span>Deliver to</span>
                    
                    <span id="user-location">Locating...</span>
                </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search products..." />
      <button onclick="loadAndRenderProducts()">Search</button>
    </div>

    <div class="navbar-right">
      
      
      <a href="wishlist.html">❤️ <span class="icon-count" id="wishlistCount">0</span></a>
      <a href="cart.html">🛒 <span class="icon-count" id="cartCount">0</span></a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="content">
    <h1>Product Viewer</h1>

    <label for="categorySelect">Category:</label>
    <select id="categorySelect">
      <option value="all">All</option>
    </select>

    <label for="sortSelect">Sort By:</label>
    <select id="sortSelect">
      <option value="default">Default</option>
      <option value="priceLowHigh">Price: Low to High</option>
      <option value="priceHighLow">Price: High to Low</option>
    </select>

    <div id="productList">Loading products...</div>
  </div>

  <!-- JS Logic -->
  <script>
    const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs'; // replace for safety in real project
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const categorySelect = document.getElementById('categorySelect');
    const sortSelect = document.getElementById('sortSelect');
    const searchInput = document.getElementById('searchInput');
    const productList = document.getElementById('productList');
    const cartCount = document.getElementById('cartCount');
    const wishlistCount = document.getElementById('wishlistCount');

    function getFromStorage(key) {
      return JSON.parse(localStorage.getItem(key) || '[]');
    }

    function setToStorage(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
      updateCounts();
    }

    function addToCart(product) {
      const cart = getFromStorage('cart');
      const existing = cart.find(item => item.id === product.id);
      if (existing) existing.qty++;
      else cart.push({ ...product, qty: 1 });
      setToStorage('cart', cart);
      alert(`${product.name} added to cart!`);
    }

    function addToWishlist(product) {
      const wishlist = getFromStorage('wishlist');
      const exists = wishlist.find(item => item.id === product.id);
      if (!exists) {
        wishlist.push(product);
        setToStorage('wishlist', wishlist);
        alert(`${product.name} added to wishlist!`);
      } else {
        alert(`${product.name} is already in wishlist.`);
      }
    }

    function updateCounts() {
      const cart = getFromStorage('cart');
      const wishlist = getFromStorage('wishlist');
      let cartQty = 0;
      cart.forEach(item => cartQty += item.qty);
      cartCount.textContent = cartQty;
      wishlistCount.textContent = wishlist.length;
    }

    async function loadCategories() {
      const { data, error } = await supabase.from('categories').select('*');
      if (error) return console.error('Error loading categories:', error.message);
      data.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat.id;
        option.textContent = cat.name;
        categorySelect.appendChild(option);
      });
    }

    async function fetchProducts(categoryId) {
      let query = supabase.from('products').select('*');
      if (categoryId && categoryId !== 'all') {
        query = query.eq('category_id', categoryId);
      }
      return await query;
    }

    function filterAndSortProducts(products) {
      const searchTerm = searchInput.value.toLowerCase();
      let filtered = products.filter(prod =>
        prod.name.toLowerCase().includes(searchTerm) ||
        prod.description.toLowerCase().includes(searchTerm)
      );

      const sortBy = sortSelect.value;
      if (sortBy === 'priceLowHigh') filtered.sort((a, b) => a.price - b.price);
      else if (sortBy === 'priceHighLow') filtered.sort((a, b) => b.price - a.price);

      return filtered;
    }

    function displayProducts(products) {
      if (!products || products.length === 0) {
        productList.innerHTML = '<p>No products found.</p>';
        return;
      }

      const container = document.createElement('div');
      products.forEach(prod => {
        const productDiv = document.createElement('div');
        productDiv.className = 'product';

        const img = document.createElement('img');
        img.src = prod.image_url;
        img.alt = prod.name;

        const info = document.createElement('div');
        info.className = 'product-info';
        info.innerHTML = `
          <h3>${prod.name}</h3>
          <p>${prod.description}</p>
          <p><strong>Price:</strong> ₹${prod.price}</p>
        `;

        const addCartBtn = document.createElement('button');
        addCartBtn.className = 'btn add-cart-btn';
        addCartBtn.textContent = 'Add to Cart';
        addCartBtn.onclick = () => addToCart(prod);

        const addWishBtn = document.createElement('button');
        addWishBtn.className = 'btn add-wishlist-btn';
        addWishBtn.textContent = 'Add to Wishlist';
        addWishBtn.onclick = () => addToWishlist(prod);

        productDiv.appendChild(img);
        productDiv.appendChild(info);
        productDiv.appendChild(addCartBtn);
        productDiv.appendChild(addWishBtn);
        container.appendChild(productDiv);
      });

      productList.innerHTML = '';
      productList.appendChild(container);
    }
    function showLocation(position) {
    const latitude = position.coords.latitude;
    const longitude = position.coords.longitude;

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&addressdetails=1`)
        .then(response => response.json())
        .then(data => {
            let locationString = "";

            if (data.address) {
                // Get street, falling back to alternatives if necessary
                const street = data.address.road || data.address.pedestrian || data.address.street || "";
                // Get locality: suburb, neighbourhood, or city_district
                const locality = data.address.suburb || data.address.neighbourhood || data.address.city_district || "";
                // Get city, town, village, or hamlet
                const city = data.address.city || data.address.town || data.address.village || data.address.hamlet || "";

                // Build the location string: locality, city (street is optional)
                if (locality && city) {
                    locationString = `${locality}, ${city}`;
                } else if (city) {
                    locationString = city;
                } else if (locality) {
                    locationString = locality;
                } else {
                    locationString = "Location unavailable";
                }
            } else {
                locationString = "Location unavailable";
            }

            // Display location
            document.getElementById('user-location').textContent = locationString;
        })
        .catch(error => {
            console.error('Geocoding error:', error);
            document.getElementById('user-location').textContent = "Location service error";
        });
}

function showError(error) {
    const messages = {
        1: 'Location access denied',
        2: 'Location unavailable',
        3: 'Location request timed out'
    };
    document.getElementById('user-location').textContent = messages[error.code] || 'Location detection failed';
}

function initLocation() {
    const locElem = document.getElementById('user-location');
    if (!locElem) return;
    locElem.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Detecting...';

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            showLocation,
            showError,
            { enableHighAccuracy: true, timeout: 10000 }
        );
    } else {
        locElem.textContent = "Geolocation not supported";
    }
}

// Call this on DOMContentLoaded
window.addEventListener('DOMContentLoaded', function() {
    initLocation();
    updateCartCount(); // if you want to keep cart count update on load
});

        auth.signOut().then(function() {
          window.location.href = "sign_in.html";
        });
      }
      function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,es,fr,de,hi,ar,zh-CN',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE
    }, 'google_translate_element');
  }

  function applySavedLanguage() {
    const savedLang = localStorage.getItem('preferredLang');
    if (savedLang) {
      const langMap = {
        'English': 'en',
        'Spanish': 'es',
        'French': 'fr',
        'German': 'de',
        'Hindi': 'hi',
        'Arabic': 'ar',
        'Chinese (Simplified)': 'zh-CN'
      };
      const code = langMap[savedLang];
      if (code) {
        const select = document.querySelector("select.goog-te-combo");
        if (select) {
          select.value = code;
          select.dispatchEvent(new Event("change"));
        }
      }
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    setTimeout(applySavedLanguage, 1000); // wait for translate widget
  });

    async function loadAndRenderProducts() {
      productList.innerHTML = 'Loading products...';
      const categoryId = categorySelect.value;
      const { data, error } = await fetchProducts(categoryId);
      if (error) {
        productList.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
        return;
      }
      const filtered = filterAndSortProducts(data);
      displayProducts(filtered);
    }

    categorySelect.addEventListener('change', loadAndRenderProducts);
    sortSelect.addEventListener('change', loadAndRenderProducts);
    searchInput.addEventListener('input', loadAndRenderProducts);

    async function init() {
      await loadCategories();
      updateCounts();
      loadAndRenderProducts();
    }

    init();
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
