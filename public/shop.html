<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Product Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    select { padding: 5px; font-size: 16px; margin-bottom: 20px; }

    .top-icons {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      margin-bottom: 10px;
    }
    .top-icons a {
      text-decoration: none;
      font-size: 24px;
      color: black;
      position: relative;
    }
    .icon-count {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #e74c3c;
      color: white;
      font-size: 12px;
      border-radius: 50%;
      padding: 2px 6px;
    }

    .product {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .product img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 5px;
    }
    .product-info {
      flex: 1;
    }
    .product-info h3 { margin: 0 0 5px 0; }
    .product-info p { margin: 3px 0; }
    .btn {
      padding: 6px 14px;
      font-size: 14px;
      margin-right: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .add-cart-btn {
      background-color: #27ae60;
      color: white;
    }
    .add-wishlist-btn {
      background-color: #3498db;
      color: white;
    }
  </style>
</head>
<body>

  <div class="top-icons">
    <a href="wishlist.html">
      ❤️ <span class="icon-count" id="wishlistCount">0</span>
    </a>
    <a href="cart.html">
      🛒 <span class="icon-count" id="cartCount">0</span>
    </a>
  </div>

  <h1>Product Viewer</h1>

  <label for="categorySelect">Select a Category:</label>
  <select id="categorySelect">
    <option value="">-- Select --</option>
  </select>

  <div id="productList">Please select a category.</div>

  <script>
    const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const categorySelect = document.getElementById('categorySelect');
    const productList = document.getElementById('productList');
    const cartCount = document.getElementById('cartCount');
    const wishlistCount = document.getElementById('wishlistCount');

    // --- LocalStorage Helpers ---
    function getFromStorage(key) {
      return JSON.parse(localStorage.getItem(key) || '[]');
    }
    function setToStorage(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
      updateCounts();
    }

    function addToCart(product) {
      const cart = getFromStorage('cart');
      const existing = cart.find(item => item.id === product.id);
      if (existing) existing.qty++;
      else cart.push({ ...product, qty: 1 });
      setToStorage('cart', cart);
      alert(`${product.name} added to cart!`);
    }

    function addToWishlist(product) {
      const wishlist = getFromStorage('wishlist');
      const exists = wishlist.find(item => item.id === product.id);
      if (!exists) {
        wishlist.push(product);
        setToStorage('wishlist', wishlist);
        alert(`${product.name} added to wishlist!`);
      } else {
        alert(`${product.name} is already in wishlist.`);
      }
    }

    function updateCounts() {
      const cart = getFromStorage('cart');
      const wishlist = getFromStorage('wishlist');
      let cartQty = 0;
      cart.forEach(item => cartQty += item.qty);
      cartCount.textContent = cartQty;
      wishlistCount.textContent = wishlist.length;
    }

    async function loadCategories() {
      const { data, error } = await supabase.from('categories').select('*');
      if (error) {
        console.error('Error loading categories:', error.message);
        return;
      }
      data.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat.id;
        option.textContent = cat.name;
        categorySelect.appendChild(option);
      });
    }

    async function loadProducts(categoryId) {
      productList.innerHTML = 'Loading products...';
      const { data, error } = await supabase
        .from('products')
        .select('*')
        .eq('category_id', categoryId);

      if (error) {
        productList.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        productList.innerHTML = '<p>No products found for this category.</p>';
        return;
      }

      const container = document.createElement('div');
      data.forEach(prod => {
        const productDiv = document.createElement('div');
        productDiv.className = 'product';

        const img = document.createElement('img');
        img.src = prod.image_url;
        img.alt = prod.name;

        const info = document.createElement('div');
        info.className = 'product-info';
        info.innerHTML = `
          <h3>${prod.name}</h3>
          <p>${prod.description}</p>
          <p><strong>Price:</strong> ₹${prod.price}</p>
        `;

        const addCartBtn = document.createElement('button');
        addCartBtn.className = 'btn add-cart-btn';
        addCartBtn.textContent = 'Add to Cart';
        addCartBtn.onclick = () => addToCart({
          id: prod.id,
          name: prod.name,
          price: prod.price
        });

        const addWishBtn = document.createElement('button');
        addWishBtn.className = 'btn add-wishlist-btn';
        addWishBtn.textContent = 'Add to Wishlist';
        addWishBtn.onclick = () => addToWishlist({
          id: prod.id,
          name: prod.name,
          price: prod.price,
          image_url: prod.image_url,
          description: prod.description
        });

        productDiv.appendChild(img);
        productDiv.appendChild(info);
        productDiv.appendChild(addCartBtn);
        productDiv.appendChild(addWishBtn);
        container.appendChild(productDiv);
      });

      productList.innerHTML = '';
      productList.appendChild(container);
    }

    categorySelect.addEventListener('change', e => {
      const categoryId = e.target.value;
      if (categoryId) {
        loadProducts(categoryId);
      } else {
        productList.innerHTML = 'Please select a category.';
      }
    });

    loadCategories();
    updateCounts();
  </script>
</body>
</html>
