<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Product Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    select { padding: 5px; font-size: 16px; margin-bottom: 20px; }
    .product { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 15px; align-items: center; }
    .product img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
    .product-info { flex: 1; }
    .product-info h3 { margin: 0 0 5px 0; }
    .product-info p { margin: 3px 0; }
    .add-cart-btn { padding: 6px 16px; font-size: 15px; background: #27ae60; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .add-cart-btn:active { background: #219150; }
    .cart-icon { position: fixed; top: 18px; right: 24px; font-size: 28px; cursor: pointer; }
    .cart-count { background: #e74c3c; color: #fff; border-radius: 50%; padding: 2px 8px; font-size: 13px; vertical-align: super; margin-left: 2px; }
    /* Cart modal styles */
    #cartModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.3); }
    #cartModal .modal-content { background: #fff; margin: 60px auto; padding: 24px 20px; border-radius: 10px; width: 95%; max-width: 420px; position: relative; }
    #cartModal h2 { margin-top: 0; }
    #cartModal .close { position: absolute; right: 18px; top: 12px; font-size: 22px; cursor: pointer; color: #888; }
    #cartModal ul { list-style: none; padding: 0; }
    #cartModal li { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 7px; }
    #cartModal .cart-total { font-weight: bold; margin-top: 18px; }
    #cartModal .cart-actions { margin-top: 18px; text-align: right; }
    #cartModal .cart-actions button { margin-left: 8px; }
    .qty-btn { padding: 2px 8px; margin: 0 3px; font-size: 15px; }
  </style>
</head>
<body>
  <h1>Product Viewer</h1>

  <!-- Cart Icon -->
  <span class="cart-icon" onclick="showCartModal()">
    🛒<span class="cart-count" id="cartCount">0</span>
  </span>

  <label for="categorySelect">Select a Category:</label>
  <select id="categorySelect">
    <option value="">-- Select --</option>
  </select>

  <div id="productList">Please select a category.</div>

  <!-- Cart Modal -->
  <div id="cartModal">
    <div class="modal-content">
      <span class="close" onclick="hideCartModal()">&times;</span>
      <h2>Your Cart</h2>
      <ul id="cartItems"></ul>
      <div class="cart-total" id="cartTotal"></div>
      <div class="cart-actions">
        <button onclick="clearCart()">Clear Cart</button>
        <button onclick="hideCartModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const categorySelect = document.getElementById('categorySelect');
    const productList = document.getElementById('productList');
    const cartCount = document.getElementById('cartCount');
    const cartModal = document.getElementById('cartModal');
    const cartItems = document.getElementById('cartItems');
    const cartTotal = document.getElementById('cartTotal');

    // --- CART LOGIC ---
    function getCart() {
      return JSON.parse(localStorage.getItem('cart') || '[]');
    }
    function setCart(cart) {
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
    }
    function updateCartCount() {
      const cart = getCart();
      let count = 0;
      cart.forEach(item => count += item.qty);
      cartCount.textContent = count;
    }
    function addToCart(product) {
      const cart = getCart();
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ ...product, qty: 1 });
      }
      setCart(cart);
      alert(`${product.name} added to cart!`);
    }
    function showCartModal() {
      renderCart();
      cartModal.style.display = 'block';
    }
    function hideCartModal() {
      cartModal.style.display = 'none';
    }
    function clearCart() {
      if (confirm("Clear all items from cart?")) {
        setCart([]);
        renderCart();
      }
    }
    function changeQty(productId, delta) {
      const cart = getCart();
      const idx = cart.findIndex(item => item.id === productId);
      if (idx > -1) {
        cart[idx].qty += delta;
        if (cart[idx].qty <= 0) cart.splice(idx, 1);
        setCart(cart);
        renderCart();
      }
    }
    function renderCart() {
      const cart = getCart();
      cartItems.innerHTML = '';
      let total = 0;
      if (cart.length === 0) {
        cartItems.innerHTML = '<li>Your cart is empty.</li>';
      } else {
        cart.forEach(item => {
          total += item.price * item.qty;
          const li = document.createElement('li');
          li.innerHTML = `
            <strong>${item.name}</strong> <br>
            <span>₹${item.price} x ${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          `;
          cartItems.appendChild(li);
        });
      }
      cartTotal.innerHTML = `Total: ₹${total.toFixed(2)}`;
      updateCartCount();
    }
    // --- END CART LOGIC ---

    // Fetch categories
    async function loadCategories() {
      const { data, error } = await supabase.from('categories').select('*');
      if (error) {
        console.error('Error loading categories:', error.message);
        return;
      }
      data.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat.id;
        option.textContent = cat.name;
        categorySelect.appendChild(option);
      });
    }

    // Fetch products by category ID
    async function loadProducts(categoryId) {
      productList.innerHTML = 'Loading products...';
      const { data, error } = await supabase
        .from('products')
        .select('*')
        .eq('category_id', categoryId);

      if (error) {
        productList.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        productList.innerHTML = '<p>No products found for this category.</p>';
        return;
      }

      const container = document.createElement('div');
      data.forEach(prod => {
        const productDiv = document.createElement('div');
        productDiv.className = 'product';

        const img = document.createElement('img');
        img.src = prod.image_url;
        img.alt = prod.name;

        const info = document.createElement('div');
        info.className = 'product-info';
        info.innerHTML = `
          <h3>${prod.name}</h3>
          <p>${prod.description}</p>
          <p><strong>Price:</strong> ₹${prod.price}</p>
        `;

        const addBtn = document.createElement('button');
        addBtn.className = 'add-cart-btn';
        addBtn.textContent = 'Add to Cart';
        addBtn.onclick = () => addToCart({
          id: prod.id,
          name: prod.name,
          price: prod.price
        });

        productDiv.appendChild(img);
        productDiv.appendChild(info);
        productDiv.appendChild(addBtn);
        container.appendChild(productDiv);
      });

      productList.innerHTML = '';
      productList.appendChild(container);
    }

    // Event listener
    categorySelect.addEventListener('change', e => {
      const categoryId = e.target.value;
      if (categoryId) {
        loadProducts(categoryId);
      } else {
        productList.innerHTML = 'Please select a category.';
      }
    });

    // Initial load
    loadCategories();
    updateCartCount();

    // For closing modal when clicking outside of it
    window.onclick = function(event) {
      if (event.target === cartModal) {
        hideCartModal();
      }
    }
  </script>
</body>
</html>
