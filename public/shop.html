<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Product Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    select { padding: 5px; font-size: 16px; margin-bottom: 20px; }
    .product { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 15px; align-items: center; }
    .product img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
    .product-info { flex: 1; }
    .product-info h3 { margin: 0 0 5px 0; }
    .product-info p { margin: 3px 0; }
    .add-cart-btn, .wishlist-btn {
      padding: 6px 16px; font-size: 15px; background: #27ae60; color: #fff;
      border: none; border-radius: 4px; cursor: pointer;
    }
    .wishlist-btn {
      background: #e67e22;
    }
    .add-cart-btn:active { background: #219150; }
    .wishlist-btn:active { background: #d35400; }
    .icon-container {
      position: fixed; top: 18px; right: 24px; display: flex; gap: 12px; font-size: 26px;
    }
    .icon-container span { cursor: pointer; position: relative; }
    .cart-count, .wishlist-count {
      background: #e74c3c; color: #fff; border-radius: 50%; padding: 2px 8px;
      font-size: 13px; vertical-align: super; position: absolute; top: -10px; right: -10px;
    }

    /* Modal styles */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.3); }
    .modal-content { background: #fff; margin: 60px auto; padding: 24px 20px; border-radius: 10px; width: 95%; max-width: 420px; position: relative; }
    .modal h2 { margin-top: 0; }
    .modal .close { position: absolute; right: 18px; top: 12px; font-size: 22px; cursor: pointer; color: #888; }
    .modal ul { list-style: none; padding: 0; }
    .modal li { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 7px; }
    .cart-total { font-weight: bold; margin-top: 18px; }
    .cart-actions { margin-top: 18px; text-align: right; }
    .cart-actions button { margin-left: 8px; }
    .qty-btn { padding: 2px 8px; margin: 0 3px; font-size: 15px; }
  </style>
</head>
<body>
  <h1>Product Viewer</h1>

  <div class="icon-container">
    <span onclick="showCartModal()">🛒<span class="cart-count" id="cartCount">0</span></span>
    <span onclick="showWishlistModal()">❤️<span class="wishlist-count" id="wishlistCount">0</span></span>
  </div>

  <label for="categorySelect">Select a Category:</label>
  <select id="categorySelect">
    <option value="all">All</option>
  </select>

  <div id="productList">Please select a category.</div>

  <!-- Cart Modal -->
  <div class="modal" id="cartModal">
    <div class="modal-content">
      <span class="close" onclick="hideCartModal()">&times;</span>
      <h2>Your Cart</h2>
      <ul id="cartItems"></ul>
      <div class="cart-total" id="cartTotal"></div>
      <div class="cart-actions">
        <button onclick="clearCart()">Clear Cart</button>
        <button onclick="hideCartModal()">Close</button>
      </div>
    </div>
  </div>

  <!-- Wishlist Modal -->
  <div class="modal" id="wishlistModal">
    <div class="modal-content">
      <span class="close" onclick="hideWishlistModal()">&times;</span>
      <h2>Your Wishlist</h2>
      <ul id="wishlistItems"></ul>
      <div class="cart-actions">
        <button onclick="clearWishlist()">Clear Wishlist</button>
        <button onclick="hideWishlistModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const categorySelect = document.getElementById('categorySelect');
    const productList = document.getElementById('productList');
    const cartCount = document.getElementById('cartCount');
    const wishlistCount = document.getElementById('wishlistCount');
    const cartModal = document.getElementById('cartModal');
    const wishlistModal = document.getElementById('wishlistModal');
    const cartItems = document.getElementById('cartItems');
    const wishlistItems = document.getElementById('wishlistItems');
    const cartTotal = document.getElementById('cartTotal');

    // --- CART LOGIC ---
    const getCart = () => JSON.parse(localStorage.getItem('cart') || '[]');
    const setCart = (cart) => { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); };
    const updateCartCount = () => {
      const cart = getCart();
      cartCount.textContent = cart.reduce((total, item) => total + item.qty, 0);
    };
    function addToCart(product) {
      const cart = getCart();
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ ...product, qty: 1 });
      }
      setCart(cart);
      alert(`${product.name} added to cart!`);
    }
    function showCartModal() {
      renderCart();
      cartModal.style.display = 'block';
    }
    function hideCartModal() {
      cartModal.style.display = 'none';
    }
    function clearCart() {
      if (confirm("Clear all items from cart?")) {
        setCart([]);
        renderCart();
      }
    }
    function changeQty(productId, delta) {
      const cart = getCart();
      const idx = cart.findIndex(item => item.id === productId);
      if (idx > -1) {
        cart[idx].qty += delta;
        if (cart[idx].qty <= 0) cart.splice(idx, 1);
        setCart(cart);
        renderCart();
      }
    }
    function renderCart() {
      const cart = getCart();
      cartItems.innerHTML = '';
      let total = 0;
      if (cart.length === 0) {
        cartItems.innerHTML = '<li>Your cart is empty.</li>';
      } else {
        cart.forEach(item => {
          total += item.price * item.qty;
          const li = document.createElement('li');
          li.innerHTML = `
            <strong>${item.name}</strong><br>
            ₹${item.price} x ${item.qty}
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          `;
          cartItems.appendChild(li);
        });
      }
      cartTotal.innerHTML = `Total: ₹${total.toFixed(2)}`;
      updateCartCount();
    }

    // --- WISHLIST LOGIC ---
    const getWishlist = () => JSON.parse(localStorage.getItem('wishlist') || '[]');
    const setWishlist = (wishlist) => {
      localStorage.setItem('wishlist', JSON.stringify(wishlist));
      updateWishlistCount();
    };
    const updateWishlistCount = () => {
      wishlistCount.textContent = getWishlist().length;
    };
    const addToWishlist = (product) => {
      const wishlist = getWishlist();
      if (!wishlist.some(item => item.id === product.id)) {
        wishlist.push(product);
        setWishlist(wishlist);
        alert(`${product.name} added to wishlist!`);
      } else {
        alert(`${product.name} is already in wishlist.`);
      }
    };
    function showWishlistModal() {
      renderWishlist();
      wishlistModal.style.display = 'block';
    }
    function hideWishlistModal() {
      wishlistModal.style.display = 'none';
    }
    function clearWishlist() {
      if (confirm("Clear wishlist?")) {
        setWishlist([]);
        renderWishlist();
      }
    }
    function renderWishlist() {
      const wishlist = getWishlist();
      wishlistItems.innerHTML = '';
      if (wishlist.length === 0) {
        wishlistItems.innerHTML = '<li>Your wishlist is empty.</li>';
      } else {
        wishlist.forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<strong>${item.name}</strong> - ₹${item.price}`;
          wishlistItems.appendChild(li);
        });
      }
      updateWishlistCount();
    }

    // Load categories
    async function loadCategories() {
      const { data, error } = await supabase.from('categories').select('*');
      if (error) {
        console.error('Error loading categories:', error.message);
        return;
      }
      data.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat.id;
        option.textContent = cat.name;
        categorySelect.appendChild(option);
      });
    }

    // Load products
    async function loadProducts(categoryId) {
      productList.innerHTML = 'Loading products...';
      let query = supabase.from('products').select('*');
      if (categoryId !== 'all') {
        query = query.eq('category_id', categoryId);
      }
      const { data, error } = await query;
      if (error) {
        productList.innerHTML = `<p style="color:red;">${error.message}</p>`;
        return;
      }
      if (!data || data.length === 0) {
        productList.innerHTML = '<p>No products found.</p>';
        return;
      }
      const container = document.createElement('div');
      data.forEach(prod => {
        const productDiv = document.createElement('div');
        productDiv.className = 'product';
        const img = document.createElement('img');
        img.src = prod.image_url;
        img.alt = prod.name;

        const info = document.createElement('div');
        info.className = 'product-info';
        info.innerHTML = `
          <h3>${prod.name}</h3>
          <p>${prod.description}</p>
          <p><strong>Price:</strong> ₹${prod.price}</p>
        `;

        const addBtn = document.createElement('button');
        addBtn.className = 'add-cart-btn';
        addBtn.textContent = 'Add to Cart';
        addBtn.onclick = () => addToCart({ id: prod.id, name: prod.name, price: prod.price });

        const wishlistBtn = document.createElement('button');
        wishlistBtn.className = 'wishlist-btn';
        wishlistBtn.textContent = '❤️ Wishlist';
        wishlistBtn.onclick = () => addToWishlist({ id: prod.id, name: prod.name, price: prod.price });

        productDiv.appendChild(img);
        productDiv.appendChild(info);
        productDiv.appendChild(addBtn);
        productDiv.appendChild(wishlistBtn);
        container.appendChild(productDiv);
      });
      productList.innerHTML = '';
      productList.appendChild(container);
    }

    categorySelect.addEventListener('change', e => {
      const categoryId = e.target.value;
      loadProducts(categoryId);
    });

    // Init
    loadCategories();
    updateCartCount();
    updateWishlistCount();

    // Close modals when clicking outside
    window.onclick = function(event) {
      if (event.target === cartModal) hideCartModal();
      if (event.target === wishlistModal) hideWishlistModal();
    };
  </script>
</body>
</html>
