<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Rootsy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <style>
    /* --- Cart styles (as before) --- */
    .cart-container {
      max-width: 900px;
      margin: 40px auto 20px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px #eee;
      padding: 32px 20px 24px 20px;
    }
    .cart-title {
      font-size: 2rem;
      margin-bottom: 24px;
      color: #27ae60;
      font-weight: bold;
    }
    .cart-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 28px;
    }
    .cart-table th, .cart-table td {
      padding: 14px 8px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }
    .cart-table th {
      background: #f9f9f9;
      color: #555;
    }
    .cart-img, .wishlist-img {
      width: 68px;
      height: 68px;
      object-fit: cover;
      border-radius: 6px;
      box-shadow: 0 1px 3px #ddd;
    }
    .qty-btn {
      padding: 2px 10px;
      margin: 0 3px;
      font-size: 16px;
      background: #f2f2f2;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .qty-btn:active {
      background: #e0e0e0;
    }
    .remove-btn {
      color: #e74c3c;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }
    .cart-summary {
      text-align: right;
      font-size: 1.2rem;
      margin-bottom: 18px;
    }
    .cart-actions {
      text-align: right;
    }
    .cart-actions button {
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 10px 22px;
      font-size: 1rem;
      margin-left: 8px;
      cursor: pointer;
    }
    .cart-actions button.clear {
      background: #e74c3c;
    }

    .empty-cart, .empty-wishlist {
      text-align: center;
      color: #888;
      font-size: 1.1rem;
      margin: 40px 0;
    }

    /* --- Wishlist section --- */
    .wishlist-title {
      font-size: 1.6rem;
      color: #9b59b6;
      margin: 30px 0 16px;
      font-weight: bold;
    }

    .wishlist-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 28px;
    }

    .wishlist-table th, .wishlist-table td {
      padding: 12px 8px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    .wishlist-table th {
      background: #f9f9f9;
      color: #555;
    }

    .wishlist-actions button {
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 6px 14px;
      font-size: 0.9rem;
      margin: 0 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="cart-container">
    <div class="cart-title"><i class="fa-solid fa-cart-shopping"></i> Your Shopping Cart</div>
    <div id="cartContent"></div>

    <div class="wishlist-title"><i class="fa-solid fa-heart"></i> Your Wishlist</div>
    <div id="wishlistContent"></div>
  </div>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem('cart') || '[]');
    }
    function setCart(cart) {
      localStorage.setItem('cart', JSON.stringify(cart));
    }
    function getWishlist() {
      return JSON.parse(localStorage.getItem('wishlist') || '[]');
    }
    function setWishlist(wishlist) {
      localStorage.setItem('wishlist', JSON.stringify(wishlist));
    }

    function renderCart() {
      const cart = getCart();
      const cartContent = document.getElementById('cartContent');
      if (!cart.length) {
        cartContent.innerHTML = `<div class="empty-cart">Your cart is empty.<br><a href="index.html" style="color:#27ae60;">Continue Shopping &rarr;</a></div>`;
      } else {
        let total = 0;
        let table = `<table class="cart-table">
          <tr>
            <th>Product</th>
            <th>Name</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Subtotal</th>
            <th>Remove</th>
          </tr>`;

        cart.forEach((item, idx) => {
          const subtotal = item.price * item.qty;
          total += subtotal;
          table += `<tr>
            <td><img src="${item.image || 'https://via.placeholder.com/68'}" class="cart-img" alt="${item.name}"></td>
            <td>${item.name}</td>
            <td>₹${item.price}</td>
            <td>
              <button class="qty-btn" onclick="changeQty(${idx}, -1)">-</button>
              ${item.qty}
              <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
            </td>
            <td>₹${subtotal.toFixed(2)}</td>
            <td><button class="remove-btn" onclick="removeItem(${idx})"><i class="fa fa-trash"></i></button></td>
          </tr>`;
        });

        table += `</table>
          <div class="cart-summary">Total: <strong>₹${total.toFixed(2)}</strong></div>
          <div class="cart-actions">
            <button class="clear" onclick="clearCart()">Clear Cart</button>
            <button onclick="checkoutCart()">Checkout</button>
          </div>
        `;
        cartContent.innerHTML = table;
      }

      renderWishlist(); // Load wishlist below cart
    }

    function changeQty(idx, delta) {
      const cart = getCart();
      cart[idx].qty += delta;
      if (cart[idx].qty < 1) cart.splice(idx, 1);
      setCart(cart);
      renderCart();
    }

    function removeItem(idx) {
      const cart = getCart();
      cart.splice(idx, 1);
      setCart(cart);
      renderCart();
    }

    function clearCart() {
      if (confirm("Clear your cart?")) {
        setCart([]);
        renderCart();
      }
    }

    function checkoutCart() {
  window.location.href = "checkout.html";
    }   

    function renderWishlist() {
      const wishlist = getWishlist();
      const wishlistContent = document.getElementById('wishlistContent');
      if (!wishlist.length) {
        wishlistContent.innerHTML = `<div class="empty-wishlist">Your wishlist is empty.</div>`;
        return;
      }

      let table = `<table class="wishlist-table">
        <tr>
          <th>Product</th>
          <th>Name</th>
          <th>Price</th>
          <th>Action</th>
        </tr>`;

      wishlist.forEach((item, idx) => {
        table += `<tr>
          <td><img src="${item.image || 'https://via.placeholder.com/68'}" class="wishlist-img" alt="${item.name}"></td>
          <td>${item.name}</td>
          <td>₹${item.price}</td>
          <td>
            <button onclick="addToCartFromWishlist(${idx})">Add to Cart</button>
          </td>
        </tr>`;
      });

      table += `</table>`;
      wishlistContent.innerHTML = table;
    }

    function addToCartFromWishlist(idx) {
      const wishlist = getWishlist();
      const item = wishlist[idx];
      const cart = getCart();

      const existing = cart.find(p => p.name === item.name);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ ...item, qty: 1 });
      }

      wishlist.splice(idx, 1);
      setCart(cart);
      setWishlist(wishlist);
      renderCart();
    }

    renderCart();
  </script>
</body>
</html>
