<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link rel="stylesheet" href="sign_up.css" />
  <!-- Firebase App (the core Firebase SDK) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <!-- Firebase Auth SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // Firebase config (replace with your own)
    const firebaseConfig = {
      apiKey: "AIzaSyAwrxSvkDSSk7AdhcTeo_joMkRbdGszmD8",
      authDomain: "rootsy-ec110.firebaseapp.com",
      projectId: "rootsy-ec110",
      storageBucket: "rootsy-ec110.appspot.com",
      messagingSenderId: "120254624474",
      appId: "1:120254624474:web:1ea4defdbf9d56c8ba2be3",
      measurementId: "G-0Y636N5BPV"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Supabase config (replace with your own)
    const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs';
    const supabase = supabaseJs.createClient(
      supabaseUrl,
      supabaseAnonKey,
      {
        accessToken: async () => {
          const user = firebase.auth().currentUser;
          return user ? await user.getIdToken(false) : null;
        }
      }
    );

    // Sync user to Supabase
    async function syncToSupabase(user, fullName) {
      const { data, error } = await supabase
        .from('profiles')
        .upsert([{ id: user.uid, email: user.email, full_name: fullName }]);
      if (error) {
        console.error('Supabase error:', error);
      } else {
        console.log('User synced to Supabase:', data);
      }
    }

    // Email/password sign-up
    async function handleSignUp(event) {
      event.preventDefault();
      const fullName = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await syncToSupabase(cred.user, fullName);
        window.location.href = "index.html";
      } catch (error) {
        alert(error.message);
      }
    }

    // Google sign-up
    async function signUpWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const cred = await auth.signInWithPopup(provider);
        // Full name from Google profile if available
        const fullName = cred.user.displayName || "";
        await syncToSupabase(cred.user, fullName);
        window.location.href = "index.html";
      } catch (error) {
        alert(error.message);
      }
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="signup-section">
      <h2>Create Account 👋</h2>
      <p class="subtitle">Welcome! Enter your details to start your journey with us.</p>

      <form onsubmit="handleSignUp(event)">
        <label>Full Name</label>
        <input type="text" id="fullname" placeholder="Your name" required />

        <label>Email</label>
        <input type="email" id="email" placeholder="Example@email.com" required />

        <label>Password</label>
        <input type="password" id="password" placeholder="at least 8 characters" required />

        <button type="submit">Sign up</button>
      </form>

      <div class="divider">Or</div>

      <button class="google-btn" type="button" onclick="signUpWithGoogle()">Sign up with Google</button>
      
      <p class="login">Already have an account? <a href="index.html">Sign in</a></p>

      <footer>© 2023 ALL RIGHTS RESERVED</footer>
    </div>

    <div class="image-section">
      <img src="https://i.postimg.cc/tJtr8cJR/signup-visual.avif" alt="Artistic Poster" />
    </div>
  </div>
</body>
</html>
