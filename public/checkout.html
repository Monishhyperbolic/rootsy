<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout Page</title>
  <link rel="stylesheet" href="checkout.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <script src="https://js.razorpay.com/v1/checkout.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js"></script>
</head>
<body>

<header>
  <!-- Header Content Omitted for Brevity -->
</header>

<div class="container">
  <div class="notice">Add <span class="highlight">$299.11</span> to cart and get free shipping!</div>
  <div class="checkout-grid">
    
    <!-- Billing Form -->
    <form class="billing-form">
      <h2>Billing details</h2>
      <div class="form-group double">
        <input type="text" name="firstname" placeholder="First name *" required>
        <input type="text" name="lastname" placeholder="Last name *" required>
      </div>
      <input type="text" placeholder="Company name (optional)">
      <select required>
        <option value="us">United States (US)</option>
      </select>
      <input type="text" placeholder="Street address *" required>
      <input type="text" placeholder="Apartment, suite, unit (optional)">
      <input type="text" placeholder="Town / City *" required>
      <input type="text" placeholder="State *" value="California" required>
      <input type="text" placeholder="ZIP Code *" required>
      <input type="tel" placeholder="Phone *" required>
      <input type="email" name="email" placeholder="Email address *" required>
      <div class="checkbox-group">
        <input type="checkbox" id="create-account">
        <label for="create-account">Create an account?</label>
      </div>
      <div class="checkbox-group bold">
        <input type="checkbox" id="ship-different">
        <label for="ship-different">Ship to a different address?</label>
      </div>
      <textarea placeholder="Order notes (optional)"></textarea>
    </form>

    <!-- Order Summary -->
    <div class="order-summary">
      <h2>Your order</h2>
      <div id="cart-items"></div>

      <div class="order-total">
        <div>Subtotal</div>
        <div id="subtotal">$0.00</div>
      </div>
      <div class="order-total">
        <div>Shipping:</div>
        <div>$15.00</div>
      </div>
      <div class="order-total grand-total">
        <div>Total</div>
        <div id="total">$0.00</div>
      </div>

      <h3>Payment</h3>
      <label><input type="radio" name="payment" value="bank" checked> Direct Bank Transfer</label>
      <p class="payment-note">Make your payment directly into our bank account. Your order will not be shipped until funds have cleared.</p>
      <label><input type="radio" name="payment" value="check"> Check Payments</label><br>
      <label><input type="radio" name="payment" value="cod"> Cash On Delivery</label>

      <label class="terms">
        <input type="checkbox" required> I agree to the <a href="#">terms and conditions</a> *
      </label>

      <div class="coupon-section">
        <input type="text" id="coupon-code" placeholder="Enter coupon code">
        <button type="button" onclick="applyCoupon()">Apply</button>
        <p id="discount-info"></p>
      </div>

      <div class="payment-options">
        <button type="button" onclick="initRazorpay()">Pay with Razorpay</button>
        <button type="button" onclick="handleCryptoPayment('stellar')">Pay with Stellar</button>
        <button type="button" onclick="handleCryptoPayment('coinbase')">Pay with Coinbase</button>
        <button type="button" onclick="handleCashPayment()">Cash on Delivery</button>
      </div>

      <button class="place-order">Place order</button>
    </div>
  </div>
</div>

<footer>
  <!-- Footer Content Omitted for Brevity -->
</footer>

<script>
  const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co';
  const supabaseKey = 'YOUR_SUPABASE_KEY';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  async function getUserEmail() {
    const { data: { user } } = await supabase.auth.getUser();
    return user?.email || '';
  }

  async function handleUserDetails() {
    const email = await getUserEmail();
    const { data } = await supabase.from('profiles').select('*').eq('email', email);
    if (data?.length > 0) {
      document.querySelector('[name="firstname"]').value = data[0].first_name || '';
      document.querySelector('[name="lastname"]').value = data[0].last_name || '';
      document.querySelector('[name="email"]').value = data[0].email || '';
    }
  }

  function getCart() {
    return JSON.parse(localStorage.getItem('cart')) || [];
  }

  function displayCartItems() {
    const cart = getCart();
    const cartContainer = document.getElementById('cart-items');
    let subtotal = 0;

    cart.forEach(item => {
      const itemTotal = item.price * item.qty;
      subtotal += itemTotal;

      const div = document.createElement('div');
      div.className = 'order-item';
      div.innerHTML = `<div>${item.title} ×${item.qty}</div><div>$${itemTotal.toFixed(2)}</div>`;
      cartContainer.appendChild(div);
    });

    document.getElementById('subtotal').innerText = `$${subtotal.toFixed(2)}`;
    document.getElementById('total').innerText = `$${(subtotal + 15).toFixed(2)}`;
  }

  async function applyCoupon() {
    const code = document.getElementById('coupon-code').value;
    const { data } = await supabase
      .from('coupons')
      .select('*')
      .eq('code', code)
      .gte('valid_until', new Date().toISOString());

    if (data?.length > 0) {
      const coupon = data[0];
      const subtotal = getCart().reduce((sum, item) => sum + (item.price * item.qty), 0);
      let discount = 0;

      if (coupon.discount_type === 'percentage') {
        discount = (subtotal * coupon.discount_value) / 100;
      } else {
        discount = coupon.discount_value;
      }

      const newTotal = subtotal + 15 - discount;
      document.getElementById('discount-info').innerText = `Coupon applied: -$${discount.toFixed(2)}`;
      document.getElementById('total').innerText = `$${newTotal.toFixed(2)}`;
    } else {
      document.getElementById('discount-info').innerText = 'Invalid or expired coupon code.';
    }
  }

  function initRazorpay() {
    const total = parseFloat(document.getElementById('total').innerText.replace('$', ''));
    const options = {
      key: "YOUR_RAZORPAY_KEY",
      amount: total * 100,
      currency: "USD",
      handler: function (response) {
        alert('Payment Successful! ID: ' + response.razorpay_payment_id);
      }
    };
    new Razorpay(options).open();
  }

  function handleCryptoPayment(currency) {
    alert(`Redirecting to ${currency.toUpperCase()} payment gateway...`);
    // Implement actual logic with backend API
  }

  function handleCashPayment() {
    alert("Cash on Delivery selected. Complete order will be placed.");
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await handleUserDetails();
    displayCartItems();
  });
</script>
</body>
</html>
