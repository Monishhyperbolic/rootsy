<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seller Login - Rootsy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.35.0/dist/umd/supabase.min.js"></script>
  
</head>
<body class="bg-[#f9f9f9] flex flex-col items-center justify-center min-h-screen font-sans">
  <div class="navbar w-full">
    <a href="index.html" class="logo">
      <img src="https://i.ibb.co/9kyCpTBY/Image-Preview-from-Remove-bg.png" style="width: 200px; height: auto;" alt="Logo" />
    </a>
  </div>

  <div class="flex-grow flex items-center justify-center w-full">
    <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md" id="login-section">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-blue-600 mb-1">Welcome Back, Seller!</h2>
        <p class="text-gray-500 text-sm">Login to manage your orders & products</p>
      </div>

      <!-- Google Login -->
      <button id="google-login" class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-lg py-2 mb-6 hover:bg-gray-100 transition">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
        <span class="text-gray-700 font-medium">Login with Google</span>
      </button>

      <div id="login-status" class="text-center text-sm mt-4 hidden">
        <div class="animate-spin inline-block w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full mr-2"></div>
        <span>Logging in...</span>
      </div>
      
      <div id="login-error" class="text-center text-sm text-red-500 mt-4 hidden"></div>
    </div>

    <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md hidden" id="form-section">
      <h2 class="text-2xl font-bold text-blue-600 mb-6">Complete Your Profile</h2>

      <!-- Form to collect seller details -->
      <form id="seller-form" class="space-y-5">
        <div>
          <label class="block text-gray-600 mb-1">Name</label>
          <input type="text" id="name" placeholder="Enter your name"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">PIN Code</label>
          <div class="flex items-center gap-2">
            <input type="text" id="pincode" placeholder="Enter your PIN code"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none">
            <button type="button" id="fetch-location" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded text-sm">
              Verify
            </button>
          </div>
          <p id="pincode-status" class="text-xs mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Location</label>
          <input type="text" id="location" placeholder="Enter your location"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        </div>

        <!-- Hidden fields for coordinates -->
        <input type="hidden" id="location-latitude">
        <input type="hidden" id="location-longitude">

        <div id="coordinates-display" class="text-xs text-gray-500 hidden">
          <div>Location coordinates detected:</div>
          <div>Latitude: <span id="lat-display"></span>, Longitude: <span id="lng-display"></span></div>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
          Save Profile
        </button>
      </form>
    </div>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAwrxSvkDSSk7AdhcTeo_joMkRbdGszmD8",
      authDomain: "rootsy-ec110.firebaseapp.com",
      projectId: "rootsy-ec110",
      storageBucket: "rootsy-ec110.appspot.com",
      messagingSenderId: "120254624474",
      appId: "1:120254624474:web:1ea4defdbf9d56c8ba2be3",
      measurementId: "G-0Y636N5BPV"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Supabase Configuration
    const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs'; // Replace with your actual Supabase anon key
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Get status elements
    const loginStatus = document.getElementById('login-status');
    const loginError = document.getElementById('login-error');

    // Check if user is already logged in
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        try {
          // Check if the user exists in the 'sellers' table in Supabase
          const { data, error } = await supabaseClient
            .from('sellers')
            .select('*')
            .eq('email', user.email)
            .single();

          if (error && error.code !== 'PGRST116') {
            throw error;
          }

          if (data) {
            // User exists, redirect to dashboard
            window.location.href = "/dashboard.html";
          } else {
            // User does not exist, show the profile form
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("form-section").classList.remove("hidden");
          }
        } catch (error) {
          console.error("Error checking user in Supabase:", error);
          showLoginError("Database error: " + error.message);
        }
      }
    });

    // Google Login functionality
    document.getElementById('google-login').addEventListener('click', () => {
      loginStatus.classList.remove('hidden');
      loginError.classList.add('hidden');
      
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      
      auth.signInWithPopup(provider)
        .then(async (result) => {
          const user = result.user;
          console.log(`User logged in successfully:`, user.email);

          try {
            // Check if the user exists in the 'sellers' table in Supabase
            const { data, error } = await supabaseClient
              .from('sellers')
              .select('*')
              .eq('email', user.email)
              .single();

            if (error && error.code !== 'PGRST116') {
              throw error;
            }

            if (data) {
              // User exists, redirect to dashboard
              window.location.href = "/dashboard.html";
            } else {
              // User does not exist, show the profile form
              document.getElementById("login-section").classList.add("hidden");
              document.getElementById("form-section").classList.remove("hidden");
            }
          } catch (error) {
            console.error("Error checking user in Supabase:", error);
            showLoginError("Database error: " + error.message);
          }
        })
        .catch((error) => {
          console.error("Error during Google login: ", error);
          showLoginError("Login failed: " + error.message);
        })
        .finally(() => {
          loginStatus.classList.add('hidden');
        });
    });

    function showLoginError(message) {
      loginError.textContent = message;
      loginError.classList.remove('hidden');
      loginStatus.classList.add('hidden');
    }

    // Function to fetch location coordinates from pincode
    document.getElementById('fetch-location').addEventListener('click', async function() {
      const pincode = document.getElementById('pincode').value.trim();
      const pincodeStatus = document.getElementById('pincode-status');
      
      if (!pincode || pincode.length !== 6 || !/^\d+$/.test(pincode)) {
        pincodeStatus.textContent = 'Please enter a valid 6-digit PIN code';
        pincodeStatus.classList.remove('hidden', 'text-green-500');
        pincodeStatus.classList.add('text-red-500');
        return;
      }

      // Show loading state
      this.disabled = true;
      this.textContent = 'Fetching...';
      pincodeStatus.textContent = 'Fetching location data...';
      pincodeStatus.classList.remove('hidden', 'text-red-500', 'text-green-500');
      pincodeStatus.classList.add('text-blue-500');

      try {
        // Using India Post API (you may need to replace with a more reliable API)
        const response = await fetch(`https://api.postalpincode.in/pincode/${pincode}`);
        const data = await response.json();

        if (data && data[0].Status === 'Success' && data[0].PostOffice && data[0].PostOffice.length > 0) {
          const postOffice = data[0].PostOffice[0];
          document.getElementById('location').value = `${postOffice.Block || postOffice.Name}, ${postOffice.District}, ${postOffice.State}`;
          
          // Now fetch coordinates based on the address
          await fetchCoordinates(postOffice);
          
          pincodeStatus.textContent = 'Location found successfully';
          pincodeStatus.classList.remove('text-blue-500', 'text-red-500');
          pincodeStatus.classList.add('text-green-500');
        } else {
          throw new Error('PIN code not found');
        }
      } catch (error) {
        console.error('Error fetching location:', error);
        pincodeStatus.textContent = 'Error: Could not find location for this PIN code';
        pincodeStatus.classList.remove('text-blue-500', 'text-green-500');
        pincodeStatus.classList.add('text-red-500');
        
        // Clear the hidden coordinate fields
        document.getElementById('location-latitude').value = '';
        document.getElementById('location-longitude').value = '';
        document.getElementById('coordinates-display').classList.add('hidden');
      } finally {
        // Reset button state
        this.disabled = false;
        this.textContent = 'Verify';
      }
    });

    // Function to fetch coordinates based on address
    async function fetchCoordinates(postOffice) {
      const address = `${postOffice.Name}, ${postOffice.District}, ${postOffice.State}, India`;
      
      try {
        // Using Nominatim OpenStreetMap API (free, but has usage limits)
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
        const data = await response.json();

        if (data && data.length > 0) {
          const lat = data[0].lat;
          const lng = data[0].lon;
          
          // Set the hidden field values
          document.getElementById('location-latitude').value = lat;
          document.getElementById('location-longitude').value = lng;
          
          // Display coordinates
          document.getElementById('lat-display').textContent = lat;
          document.getElementById('lng-display').textContent = lng;
          document.getElementById('coordinates-display').classList.remove('hidden');
          
          return { lat, lng };
        } else {
          throw new Error('Could not find coordinates for this address');
        }
      } catch (error) {
        console.error('Error fetching coordinates:', error);
        throw error;
      }
    }

    // Handle form submission for creating a new seller profile
    document.getElementById('seller-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const pincode = document.getElementById('pincode').value.trim();
      const location = document.getElementById('location').value.trim();
      const latitude = document.getElementById('location-latitude').value;
      const longitude = document.getElementById('location-longitude').value;

      if (!name || !pincode || !location) {
        alert('Please fill in all required fields');
        return;
      }

      // Show loading state
      const submitButton = e.target.querySelector('button[type="submit"]');
      const originalText = submitButton.textContent;
      submitButton.disabled = true;
      submitButton.textContent = 'Saving...';

      try {
        // Insert data into Supabase
        const user = firebase.auth().currentUser;
        if (!user) {
          throw new Error('No authenticated user found');
        }

        const sellerData = { 
          name, 
          email: user.email, 
          location,
          location_latitude: parseFloat(latitude) || null,
          location_longitude: parseFloat(longitude) || null
        };

  

        const { data, error } = await supabaseClient
          .from('sellers')
          .insert([sellerData]);

        if (error) {
          throw error;
        }

        alert('Profile saved successfully!');
        // Redirect to dashboard after successful submission
        window.location.href = "/dashboard.html";
      } catch (error) {
        console.error('Error inserting data:', error);
        alert('Error saving profile: ' + error.message);
      } finally {
        // Reset button state
        submitButton.disabled = false;
        submitButton.textContent = originalText;
      }
    });
  </script>
</body>
</html>
