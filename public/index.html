<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Example</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co'; // Replace with your Supabase project URL
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs'; // Replace with your anon key
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function fetchData() {
            const { data, error } = await supabase
                .from('categories') 
                .select('*');
            if (error) {
                console.error('Error fetching data:', error);
            } else {
                console.log('Data:', data);
                displayData(data);
            }
        }

        function displayData(data) {
            const container = document.createElement('div');
            container.style.marginTop = '20px';
            container.style.fontFamily = 'Arial, sans-serif';

            if (data.length === 0) {
                container.innerHTML = '<p>No data found.</p>';
            } else {
                const list = document.createElement('ul');
                data.forEach(item => {
                    const listItem = document.createElement('li');
                    listItem.textContent = JSON.stringify(item); // Display each item as a JSON string
                    list.appendChild(listItem);
                });
                container.appendChild(list);
            }

            document.body.appendChild(container);
        }

        fetchData();
    </script>
</head>
<body>
    <h1>Supabase Connection Example</h1>
</body>
</html>
