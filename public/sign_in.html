<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Auth Example</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseUrl = 'https://takraoqafzlolecjgtgn.supabase.co'; // Replace with your Supabase project URL
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3Jhb3FhZnpsb2xlY2pndGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MDc4NTMsImV4cCI6MjA2MDQ4Mzg1M30.XMVvPXRnI5Z_0R-3Pn9OHUAkAT6mzpQJc6pu0q3aegs'; // Replace with your anon key
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { user, error } = await supabase.auth.signUp({
                email,
                password,
            });

            if (error) {
                console.error('Error signing up:', error);
                alert(error.message);
            } else {
                console.log('User signed up:', user);
                alert('Sign up successful! Please check your email for confirmation.');
            }
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { user, error } = await supabase.auth.signIn({
                email,
                password,
            });

            if (error) {
                console.error('Error signing in:', error);
                alert(error.message);
            } else {
                console.log('User signed in:', user);
                alert('Sign in successful!');
            }
        }

        async function signOut() {
            const { error } = await supabase.auth.signOut();
            if (error) {
                console.error('Error signing out:', error);
                alert(error.message);
            } else {
                console.log('User signed out');
                alert('Sign out successful!');
            }
        }

        async function signInWithGoogle() {
            const { user, error } = await supabase.auth.signIn({
                provider: 'google',
            });

            if (error) {
                console.error('Error signing in with Google:', error);
                alert(error.message);
            } else {
                console.log('User signed in with Google:', user);
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Supabase Auth Example</h1>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="signUp()">Sign Up</button>
        <button onclick="signIn()">Sign In</button>
        <button onclick="signOut()">Sign Out</button>
        <button onclick="signInWithGoogle()">Sign In with Google</button>
    </div>
</body>
</html>
